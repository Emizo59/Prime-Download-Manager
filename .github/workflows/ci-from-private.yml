name: CI (from private source)

# One-off CI verification run on this PUBLIC repo's FREE Actions (public repos have
# unlimited minutes), used when the account's private-repo Actions are blocked by a
# billing/payment issue. The private source is cloned into the EPHEMERAL runner only
# (via SOURCE_REPO_TOKEN) and is never published here — same no-leak pattern as
# build-release.yml. This job does NOT publish a release: it only builds, runs the
# test suite, and smoke-tests a real clip download. Delete the run after it finishes.
on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch or tag in the private source to build & test'
        required: true

jobs:
  windows-ci:
    runs-on: windows-latest
    timeout-minutes: 50
    defaults:
      run:
        shell: pwsh
    steps:
      # Private source → runner only (token-gated). Never committed/published here.
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO_NAME }}
          ref: ${{ github.event.inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install Qt 6.9.3 (win64_mingw) + MinGW 13.1.0 + Ninja
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310 tools_ninja'

      - name: Fetch prebuilt libtorrent + boost (from private ci-deps-win)
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path thirdparty | Out-Null
          gh release download ci-deps-win --repo ${{ secrets.SOURCE_REPO_NAME }} -p thirdparty-mingw64.tar.gz --output dep.tgz
          tar -xzf dep.tgz -C thirdparty
          if (-not (Test-Path "thirdparty\mingw64\lib\libtorrent-rasterbar.dll.a")) { throw "libtorrent staging failed" }

      - name: Fetch curl (win64 mingw dev headers + import lib)
        run: |
          Invoke-WebRequest -Uri "https://curl.se/windows/latest.cgi?p=win64-mingw.zip" -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath curl_dl -Force
          $dir = (Get-ChildItem curl_dl -Directory | Select-Object -First 1).FullName
          if (-not (Test-Path "$dir\include\curl\curl.h")) { throw "curl headers not found" }
          "CURL_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure (Ninja + Qt MinGW 13.1.0, tests ON)
        run: |
          $mingw = ("$env:IQTA_TOOLS\mingw1310_64\bin" -replace '\\','/')
          $qt = ($env:QT_ROOT_DIR -replace '\\','/')
          $curl = ($env:CURL_DIR -replace '\\','/')
          # Pin the extractor test to the runner's real Python (has _ssl), not MinGW's 3.9.
          $py = if ($env:pythonLocation) { Join-Path $env:pythonLocation 'python.exe' } else { (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.*\x64\python.exe' | Select-Object -Last 1).FullName }
          $py = ($py -replace '\\','/')
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          cmake -B build -G Ninja -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$mingw/gcc.exe" -DCMAKE_CXX_COMPILER="$mingw/g++.exe" `
            -DCMAKE_PREFIX_PATH="$qt;$curl" -DDM_PYTHON3="$py"

      - name: Build
        run: |
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          cmake --build build --parallel

      - name: Run tests
        run: |
          $env:PATH = "$PWD\thirdparty\mingw64\bin;$env:CURL_DIR\bin;$env:QT_ROOT_DIR\bin;$env:IQTA_TOOLS\mingw1310_64\bin;$env:PATH"
          $env:QT_QPA_PLATFORM = "offscreen"
          ctest --test-dir build --output-on-failure

      # Live download smoke test — proves the video-clip path downloads end-to-end on
      # Windows (partial → full-trim fallback). YouTube routinely blocks CI/datacenter
      # IPs, so this is continue-on-error: a network/bot-check failure warns but never
      # reds the build; a green run is positive proof.
      - name: Live clip download smoke test (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --upgrade --quiet yt-dlp
          choco install ffmpeg -y --no-progress | Out-Null
          python tools/ci_clip_smoke.py
