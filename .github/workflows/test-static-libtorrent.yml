name: TEST static libtorrent (temporary)

# Temporary feasibility probe: build libtorrent as a STATIC archive and link it into
# the exe (SAC dodge). The real question is whether the MinGW COFF 32k-section limit
# blows up ("file too big"). Delete this workflow once we have the answer.
# Uses the same private-source PAT + ci-deps-win as build-release.yml.

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch/tag in private source to build'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  probe:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO_NAME }}
          ref: ${{ github.event.inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install Qt 6.9.3 (win64_mingw) + MinGW 13.1.0 + Ninja
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310 tools_ninja'

      - name: Fetch prebuilt libtorrent + boost headers (ci-deps-win)
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path thirdparty | Out-Null
          gh release download ci-deps-win --repo ${{ secrets.SOURCE_REPO_NAME }} -p thirdparty-mingw64.tar.gz --output dep.tgz
          tar -xzf dep.tgz -C thirdparty
          if (-not (Test-Path "thirdparty\mingw64\include\libtorrent\session.hpp")) { throw "libtorrent headers missing" }
          if (-not (Test-Path "thirdparty\mingw64\include\boost\version.hpp")) { throw "boost headers missing" }

      - name: Install MinGW OpenSSL (MSYS2) for libtorrent encryption
        run: |
          C:\msys64\usr\bin\pacman -Sy --noconfirm
          C:\msys64\usr\bin\pacman -S --noconfirm --needed mingw-w64-x86_64-openssl
          if (-not (Test-Path "C:\msys64\mingw64\lib\libcrypto.a") -and -not (Test-Path "C:\msys64\mingw64\lib\libcrypto.dll.a")) {
            throw "MSYS2 openssl not installed"
          }
          Get-ChildItem C:\msys64\mingw64\lib\libssl* , C:\msys64\mingw64\lib\libcrypto* | Select-Object Name

      - name: Build STATIC libtorrent archive (the COFF probe)
        run: |
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          $env:MINGW_DIR = "$env:IQTA_TOOLS\mingw1310_64"
          $env:OPENSSL_ROOT_DIR = "C:/msys64/mingw64"
          powershell -ExecutionPolicy Bypass -File build_libtorrent_static.ps1
          if (-not (Test-Path "thirdparty\mingw64\lib\libtorrent-rasterbar.a")) { throw "static .a NOT produced" }
          $mb = [math]::Round((Get-Item "thirdparty\mingw64\lib\libtorrent-rasterbar.a").Length/1MB,1)
          Write-Host "==> static libtorrent-rasterbar.a produced: $mb MB"

      - name: Fetch curl (needed to configure the app)
        run: |
          Invoke-WebRequest -Uri "https://curl.se/windows/latest.cgi?p=win64-mingw.zip" -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath curl_dl -Force
          $dir = (Get-ChildItem curl_dl -Directory | Select-Object -First 1).FullName
          if (-not (Test-Path "$dir\include\curl\curl.h")) { throw "curl headers not found" }
          "CURL_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure app (static libtorrent auto-detected)
        run: |
          $mingw = ("$env:IQTA_TOOLS\mingw1310_64\bin" -replace '\\','/')
          $qt = ($env:QT_ROOT_DIR -replace '\\','/')
          $curl = ($env:CURL_DIR -replace '\\','/')
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          cmake -B build -G Ninja -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$mingw/gcc.exe" -DCMAKE_CXX_COMPILER="$mingw/g++.exe" `
            -DCMAKE_PREFIX_PATH="$qt;$curl;C:/msys64/mingw64" `
            -DCMAKE_EXE_LINKER_FLAGS="-LC:/msys64/mingw64/lib" 2>&1 | Tee-Object -Variable cfg
          if ($cfg -notmatch 'libtorrent: STATIC archive') { throw "CMake did NOT select the static archive" }

      - name: Build app (the real static-link + COFF test)
        run: |
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;C:\msys64\mingw64\bin;$env:PATH"
          cmake --build build --parallel
          if (-not (Test-Path "build\Prime Download Manager.exe")) { throw "exe NOT built" }
          Write-Host "==> Prime Download Manager.exe built with STATIC libtorrent"
          if (Test-Path "build\libtorrent-rasterbar.dll") { Write-Host "note: DLL still present in build dir (not needed)" }
          $sz = [math]::Round((Get-Item "build\Prime Download Manager.exe").Length/1MB,1)
          Write-Host "==> exe size: $sz MB (should be larger — libtorrent is now inside)"

      - name: RESULT
        if: always()
        run: Write-Host "Probe finished — check the two steps above for pass/fail."
