name: Build & Release (from private source)

# Builds the Windows installer on this PUBLIC repo's free Actions (public repos have
# unlimited minutes — no quota). The source is cloned from the private repository
# into the ephemeral runner ONLY (via the SOURCE_REPO_TOKEN secret) and is discarded
# when the job ends — it is never published here. Mirrors build_mingw.bat + setup.iss.
#
# Setup (once): add a repo secret SOURCE_REPO_TOKEN = a fine-grained PAT with
# Contents:Read on the private repository.
#
# Run: Actions → "Build & Release (from private source)" → Run workflow → pick the
# source branch/tag and the release tag (e.g. v1.0.6).
on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch or tag in private source to build'
        required: true
      release_tag:
        description: 'Release tag to publish on THIS repo (e.g. v1.0.6)'
        required: true
      prerelease:
        description: 'Publish as a pre-release (keeps the current stable as Latest)'
        type: boolean
        default: true
      make_latest:
        description: 'Mark as Latest (promotes over current stable — leave false to keep v1.0.x)'
        type: boolean
        default: false
      build_linux:
        description: 'Also build & attach the Linux AppImage (uncheck for a Windows-only run)'
        type: boolean
        default: true

permissions:
  contents: write          # create the release + upload the asset on THIS repo

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 50
    defaults:
      run:
        shell: pwsh
    steps:
      # Private source → runner only (token-gated). Never committed/published here.
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO_NAME }}
          ref: ${{ github.event.inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install Qt 6.9.3 (win64_mingw) + MinGW 13.1.0 + Ninja
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310 tools_ninja'

      - name: Stage the official, signed embeddable Python (extraction backend #2)
        run: |
          # Replaces the unsigned PyInstaller extractor.exe: a PSF-signed python.exe runs
          # the plain extractor.py, so Windows SAC/Defender only see a trusted signature.
          ./tools/setup_python_embed.ps1 -OutDir build
          $sig = Get-AuthenticodeSignature build/python/python.exe
          if ($sig.Status -ne 'Valid' -or $sig.SignerCertificate.Subject -notlike '*Python Software Foundation*') {
            throw "bundled python.exe is not validly PSF-signed: $($sig.Status)"
          }
          Write-Host "python.exe PSF-signed OK: $($sig.SignerCertificate.Subject)"

      # Prebuilt libtorrent/boost live on the private repo's ci-deps-win release —
      - name: Fetch prebuilt libtorrent + boost
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path thirdparty | Out-Null
          gh release download ci-deps-win --repo ${{ secrets.SOURCE_REPO_NAME }} -p thirdparty-mingw64.tar.gz --output dep.tgz
          tar -xzf dep.tgz -C thirdparty
          if (-not (Test-Path "thirdparty\mingw64\lib\libtorrent-rasterbar.dll.a")) { throw "libtorrent staging failed" }

      - name: Pin CMake 3.31 (CMake 4.x dropped the FindBoost module libtorrent needs)
        run: |
          Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-windows-x86_64.zip" -OutFile cmake.zip
          Expand-Archive cmake.zip -DestinationPath cmake_dl -Force
          $bin = ((Get-ChildItem cmake_dl -Directory | Select-Object -First 1).FullName) + "\bin"
          "$bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install MinGW OpenSSL (MSYS2 static) for the static libtorrent link
        run: |
          C:\msys64\usr\bin\pacman -Sy --noconfirm
          C:\msys64\usr\bin\pacman -S --noconfirm --needed mingw-w64-x86_64-openssl
          if (-not (Test-Path "C:\msys64\mingw64\lib\libcrypto.a")) { throw "no static libcrypto.a in MSYS2 openssl" }

      - name: Build STATIC libtorrent archive (SAC — absorbed into exe)
        run: |
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          $env:MINGW_DIR = "$env:IQTA_TOOLS\mingw1310_64"
          $env:OPENSSL_ROOT_DIR = "C:/msys64/mingw64"
          powershell -ExecutionPolicy Bypass -File build_libtorrent_static.ps1
          if (-not (Test-Path "thirdparty\mingw64\lib\libtorrent-rasterbar.a")) { throw "static libtorrent .a not produced" }

      - name: Fetch curl (win64 mingw dev headers + import lib + runtime DLL)
        run: |
          Invoke-WebRequest -Uri "https://curl.se/windows/latest.cgi?p=win64-mingw.zip" -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath curl_dl -Force
          $dir = (Get-ChildItem curl_dl -Directory | Select-Object -First 1).FullName
          if (-not (Test-Path "$dir\include\curl\curl.h")) { throw "curl headers not found" }
          "CURL_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Fetch yt-dlp zipapp (pinned + SHA-256) + ffmpeg.exe
        run: |
          # yt-dlp as the platform-independent ZIPAPP (not yt-dlp.exe) so the signed python
          # interpreter loads it as a module — no unsigned executable. ffmpeg has no signed
          # official build, so it stays a normal bundled binary.
          New-Item -ItemType Directory -Force -Path build\tools | Out-Null
          $ver = "2026.06.09"
          $sha = "e5d57466682cfa9d61e9cf7c8a4f09b00f4a62af37d3bbdc4bcffdf63615feac"
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/download/$ver/yt-dlp" -OutFile build\tools\yt-dlp
          $actual = (Get-FileHash -Algorithm SHA256 build\tools\yt-dlp).Hash.ToLower()
          if ($actual -ne $sha) { throw "yt-dlp zipapp SHA-256 mismatch: expected $sha got $actual" }
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath ff_dl -Force
          $ff = (Get-ChildItem ff_dl -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName
          if (-not $ff) { throw "ffmpeg.exe not found in archive" }
          New-Item -ItemType Directory -Force -Path tools | Out-Null
          Copy-Item $ff tools\ffmpeg.exe -Force

      - name: Configure (Ninja + Qt MinGW 13.1.0 — same flags as build_mingw.bat)
        run: |
          $mingw = ("$env:IQTA_TOOLS\mingw1310_64\bin" -replace '\\','/')
          $qt = ($env:QT_ROOT_DIR -replace '\\','/')
          $curl = ($env:CURL_DIR -replace '\\','/')
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          # Prerelease builds compile out the telemetry ping so test installs never count.
          $dmPre = if ('${{ github.event.inputs.prerelease }}' -eq 'true') { 'ON' } else { 'OFF' }
          cmake -B build -G Ninja -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$mingw/gcc.exe" -DCMAKE_CXX_COMPILER="$mingw/g++.exe" `
            -DCMAKE_PREFIX_PATH="$qt;$curl" `
            -DOPENSSL_ROOT_DIR="C:/msys64/mingw64" `
            -DDM_PRERELEASE=$dmPre

      - name: Build
        run: |
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:IQTA_TOOLS\Ninja;$env:QT_ROOT_DIR\bin;$env:PATH"
          cmake --build build --parallel
          if (-not (Test-Path "build\Prime Download Manager.exe")) { throw "Prime Download Manager.exe not built" }

      - name: Assert exe absorbed libtorrent + OpenSSL (SAC — no unsigned crypto DLL)
        run: |
          $objdump = "$env:IQTA_TOOLS\mingw1310_64\bin\objdump.exe"
          $deps = & $objdump -p "build\Prime Download Manager.exe" | Select-String 'DLL Name:' | ForEach-Object { ($_ -split ':')[1].Trim() }
          $bad = $deps | Where-Object { $_ -match 'torrent|libssl|libcrypto|ssl-3|crypto-3' }
          if ($bad) { throw "exe still imports unsigned crypto/torrent DLL: $($bad -join ', ')" }
          Write-Host "SAC OK: libtorrent + OpenSSL fully static inside the exe."

      - name: Deploy Qt runtime + stage DLLs, tools, extension, tutorial
        run: |
          $env:PATH = "$env:IQTA_TOOLS\mingw1310_64\bin;$env:QT_ROOT_DIR\bin;$env:PATH"
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --qmldir qml "build\Prime Download Manager.exe"
          $mingwBin = "$env:IQTA_TOOLS\mingw1310_64\bin"
          foreach ($d in @('libgcc_s_seh-1.dll','libstdc++-6.dll','libwinpthread-1.dll')) {
            if (Test-Path "$mingwBin\$d") { Copy-Item "$mingwBin\$d" build\ -Force }
          }
          $libcurl = if (Test-Path "$env:CURL_DIR\bin\libcurl-x64.dll") { "$env:CURL_DIR\bin\libcurl-x64.dll" } else { "$env:CURL_DIR\lib\libcurl-x64.dll" }
          Copy-Item $libcurl build\ -Force
          # Extraction backend (#2): plain extractor.py next to the staged yt-dlp zipapp;
          # the signed python interpreter already lives in build\python (staged earlier).
          New-Item -ItemType Directory -Force -Path build\tools | Out-Null
          Copy-Item tools\extractor.py build\tools\extractor.py -Force
          Copy-Item tools\ffmpeg.exe build\ -Force
          Copy-Item extension build\extension -Recurse -Force
          if (Test-Path extension.crx) { Copy-Item extension.crx build\ -Force }
          Copy-Item tutorial.html build\ -Force

      - name: Assert #2 layout (signed python + scripts, NO unsigned stubs)
        run: |
          foreach ($p in @("build\python\python.exe","build\tools\extractor.py","build\tools\yt-dlp","build\ffmpeg.exe")) {
            if (-not (Test-Path $p)) { throw "missing required #2 artifact: $p" }
          }
          if (Test-Path "build\extractor.exe") { throw "build\extractor.exe present — #2 must not ship it" }
          if (Test-Path "build\yt-dlp.exe")    { throw "build\yt-dlp.exe present — #2 must not ship it" }
          Write-Host "#2 layout OK: signed python.exe + extractor.py + yt-dlp zipapp, no unsigned stubs."

      - name: Compile installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc setup.iss
          if (-not (Test-Path "installer\Prime_Download_Manager_Setup.exe")) { throw "installer not produced" }

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prime_Download_Manager_Setup
          path: installer/Prime_Download_Manager_Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release (on THIS public repo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Prime Download Manager ${{ github.event.inputs.release_tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          make_latest: ${{ github.event.inputs.make_latest }}
          fail_on_unmatched_files: true
          files: |
            installer/Prime_Download_Manager_Setup.exe

  # ── Linux AppImage ───────────────────────────────────────────────────────────
  # Same token-gated private-source build as the Windows job, packaged as a self-contained
  # AppImage: Qt + QML modules via linuxdeploy-plugin-qt, plus the frozen extractor, the
  # pinned yt-dlp zipapp and a static ffmpeg staged into the AppDir so extraction, Clip and
  # merge need nothing from the host. Ubuntu 24.04's Qt (6.4) lacks QtQuick.Effects, so we
  # pin Qt 6.7.3 via aqt (as Windows pins 6.9.3). Runs after the Windows job so the release
  # already exists, smoke-tests the AppImage headless (bundled Qt only), then attaches it to
  # the SAME release with the same prerelease/make_latest flags — so both ship-test and ship
  # publish it. If this job fails the Windows installer is unaffected (already published).
  linux-appimage:
    needs: windows-installer
    if: ${{ github.event.inputs.build_linux != 'false' }}
    # Build on the OLDEST hosted Ubuntu (22.04, glibc 2.35) so the AppImage runs on older
    # distros too — a 24.04 build hard-requires glibc 2.39 and won't launch on Ubuntu 22.04 /
    # Debian 12 / Mint 21. glibc can't be bundled, so the build host sets the floor.
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"   # runners have no FUSE; run nested AppImages by extracting
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO_NAME }}
          ref: ${{ github.event.inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config file wget xz-utils git \
            python3 python3-pip python3-venv \
            libcurl4-openssl-dev libssl-dev libboost-dev libboost-system-dev \
            libgl1-mesa-dev libxkbcommon0 libxcb-cursor0 libfuse2

      # 22.04's apt libtorrent is 1.2 (no info_hash_t/info_hashes). Build 2.0 from source
      # with deprecated-functions ON so the ABI-1 members the app links stay available.
      - name: Build libtorrent 2.0 from source (ABI 1)
        run: |
          git clone --recurse-submodules --depth 1 --branch v2.0.10 \
            https://github.com/arvidn/libtorrent
          cmake -S libtorrent -B lt-build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -Ddeprecated-functions=ON -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build lt-build
          sudo cmake --install lt-build

      - name: Install Qt 6.7.3 (linux gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Build frozen extractor (PyInstaller) — browser-download /extract path
        run: |
          python3 -m pip install --user --upgrade pyinstaller yt-dlp
          python3 -m PyInstaller --clean --noconfirm \
            --distpath tools --workpath build/pyi extractor.spec
          test -f tools/extractor

      - name: Configure + build (Release)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --parallel

      - name: Install into AppDir
        run: DESTDIR="$PWD/AppDir" cmake --install build --prefix /usr

      - name: Stage tools into the AppDir (self-contained extraction + clip + merge)
        run: |
          mkdir -p AppDir/usr/bin/tools
          ver="2026.06.09"
          sha="e5d57466682cfa9d61e9cf7c8a4f09b00f4a62af37d3bbdc4bcffdf63615feac"
          wget -qO AppDir/usr/bin/tools/yt-dlp \
            "https://github.com/yt-dlp/yt-dlp/releases/download/$ver/yt-dlp"
          echo "$sha  AppDir/usr/bin/tools/yt-dlp" | sha256sum -c -
          chmod +x AppDir/usr/bin/tools/yt-dlp
          install -m755 tools/extractor AppDir/usr/bin/tools/extractor
          wget -qO ff.tar.xz \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf ff.tar.xz
          install -m755 ffmpeg-*-linux64-gpl/bin/ffmpeg AppDir/usr/bin/tools/ffmpeg

      - name: Fetch linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Drop unused Mimer SQL plugin
        run: rm -f "$QT_ROOT_DIR/plugins/sqldrivers/libqsqlmimer.so"

      - name: Build AppImage
        env:
          QML_SOURCES_PATHS: ${{ github.workspace }}/qml
          OUTPUT: Prime_Download_Manager-x86_64.AppImage
          EXTRA_PLATFORM_PLUGINS: libqoffscreen.so   # needed by the headless smoke test
        run: |
          export QMAKE="$QT_ROOT_DIR/bin/qmake6"
          export PATH="$QT_ROOT_DIR/bin:$PATH"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --icon-file resources/appicon.png --icon-filename downloadmanager \
            --plugin qt --output appimage
          ls -lh Prime_Download_Manager-x86_64.AppImage

      - name: Smoke test (headless, bundled Qt only)
        run: |
          unset QT_PLUGIN_PATH QML2_IMPORT_PATH QT_ROOT_DIR QMAKE
          export LD_LIBRARY_PATH=""
          export QT_QPA_PLATFORM=offscreen
          export HOME="$PWD/smoke-home"; mkdir -p "$HOME"
          ./Prime_Download_Manager-x86_64.AppImage > app.log 2>&1 &
          PID=$!
          sleep 12
          ALIVE=0; kill -0 "$PID" 2>/dev/null && ALIVE=1
          kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true
          echo "----- app.log -----"; cat app.log || true; echo "-------------------"
          if [ "$ALIVE" -ne 1 ]; then echo "SMOKE FAIL: app exited during startup"; exit 1; fi
          if grep -qiE 'module .* is not installed|QQmlApplicationEngine failed|error while loading shared libraries|cannot load library' app.log; then
            echo "SMOKE FAIL: QML module / shared-library error"; exit 1
          fi
          echo "SMOKE OK: launched and stayed alive with no QML/lib error"

      - name: Attach AppImage to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          make_latest: ${{ github.event.inputs.make_latest }}
          fail_on_unmatched_files: true
          files: |
            Prime_Download_Manager-x86_64.AppImage
